name: Build & Release Arqut Server CE

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set release tag
        id: set_tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "Using pushed tag: ${{ github.ref_name }}"
            echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            git fetch --tags
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            echo "Latest tag: $LATEST_TAG"
            echo "tag_name=$LATEST_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Related Tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.set_tag.outputs.tag_name }}

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.24"
          cache: true

      - name: Build Binary with GoReleaser
        run: |
          set -e
          go version
          curl -sfL https://goreleaser.com/static/run | bash -s -- release --skip=announce,publish,validate --clean

          mkdir -p releases
          cp dist/arqut-server-ce_linux_arm_7/arqut-server-ce releases/arqut-server-ce_linux-armv7
          cp dist/arqut-server-ce_linux_arm_6/arqut-server-ce releases/arqut-server-ce_linux-armv6
          cp dist/arqut-server-ce_linux_arm64_v8.0/arqut-server-ce releases/arqut-server-ce_linux-aarch64
          cp dist/arqut-server-ce_linux_amd64_v1/arqut-server-ce releases/arqut-server-ce_linux-amd64
          cp dist/arqut-server-ce_linux_386_sse2/arqut-server-ce releases/arqut-server-ce_linux-i386
          # cp dist/arqut-server-ce_windows_amd64_v1/arqut-server-ce.exe releases/arqut-server-ce_windows-amd64.exe
          # cp dist/arqut-server-ce_windows_arm64_v8.0/arqut-server-ce.exe releases/arqut-server-ce_windows-aarch64.exe

          # Rename output dirs to correct arch names
          mv dist/arqut-server-ce_linux_arm_7 dist/arm_v7
          mv dist/arqut-server-ce_linux_arm_6 dist/arm_v6
          mv dist/arqut-server-ce_linux_arm64_v8.0 dist/arm64
          mv dist/arqut-server-ce_linux_amd64_v1 dist/amd64
          mv dist/arqut-server-ce_linux_386_sse2 dist/386

          ls -Rl dist

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          # username: ${{ github.actor }}
          # password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Dockerfile
        run: |
          # Create a Dockerfile
          cat <<EOF > dist/Dockerfile
          FROM debian:bullseye-slim

          ARG TARGETARCH
          ARG TARGETVARIANT
          ARG BINARY_NAME=arqut-server-ce

          RUN mkdir -p /arqut

          COPY binaries/\${TARGETARCH}\${TARGETVARIANT:+_\${TARGETVARIANT}}/\${BINARY_NAME} /arqut/\${BINARY_NAME}

          RUN chmod +x /arqut/\${BINARY_NAME}

          ENTRYPOINT ["/arqut/\${BINARY_NAME}"]

          EOF

          # Display the Dockerfile  
          cat dist/Dockerfile

      - name: Build and push Docker images
        uses: docker/build-push-action@v4
        with:
          context: ./dist
          platforms: |
            linux/amd64
            linux/386
            linux/arm/v6
            linux/arm/v7
            linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/arqut-server-ce:latest
            ghcr.io/${{ github.repository_owner }}/arqut-server-ce:${{ steps.set_tag.outputs.tag_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.set_tag.outputs.tag_name }}
          name: "Release ${{ steps.set_tag.outputs.tag_name }}"
          body: "Automated release for Arqut Server CE"
          files: releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
